<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – YourOrg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Noto+Serif+Bengali:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>
  <div id="loader-placeholder"></div>
  <div id="navbar-placeholder"></div>

  <main style="padding-top: var(--navbar-height);">
    <section class="page-hero">
      <div class="container">
        <div class="breadcrumb" style="justify-content:center;">
          <a href="../index.html" data-en="Home" data-bn="হোম">Home</a>
          <span class="breadcrumb-sep">/</span>
          <span data-en="Contact" data-bn="যোগাযোগ">Contact</span>
        </div>
        <h1 class="reveal" data-en="Contact Us" data-bn="যোগাযোগ করুন">Contact Us</h1>
        <p class="reveal" data-en="We'd love to hear from you." data-bn="আমরা আপনার কথা শুনতে চাই।">We'd love to hear from you.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="grid grid-2" style="gap:3rem; align-items:start;">

          <!-- Contact Info -->
          <div class="reveal">
            <h3 style="margin-bottom:1.5rem;" data-en="Get in Touch" data-bn="যোগাযোগ করুন">Get in Touch</h3>
            <div style="display:flex;flex-direction:column;gap:1.25rem;">
              <div class="card" style="padding:1.25rem;display:flex;gap:1rem;align-items:flex-start;">
                <span style="font-size:1.5rem;flex-shrink:0;">📍</span>
                <div>
                  <h4 style="font-size:0.9rem;margin-bottom:4px;" data-en="Address" data-bn="ঠিকানা">Address</h4>
                  <p style="font-size:0.875rem;margin:0;" data-en="123 Main Road, Dhaka 1000, Bangladesh" data-bn="১২৩ মেইন রোড, ঢাকা ১০০০, বাংলাদেশ">123 Main Road, Dhaka 1000, Bangladesh</p>
                </div>
              </div>
              <div class="card" style="padding:1.25rem;display:flex;gap:1rem;align-items:flex-start;">
                <span style="font-size:1.5rem;flex-shrink:0;">📞</span>
                <div>
                  <h4 style="font-size:0.9rem;margin-bottom:4px;" data-en="Phone" data-bn="ফোন">Phone</h4>
                  <a href="tel:+88000000000" style="font-size:0.875rem;color:var(--color-primary);">+880 00 000 0000</a>
                </div>
              </div>
              <div class="card" style="padding:1.25rem;display:flex;gap:1rem;align-items:flex-start;">
                <span style="font-size:1.5rem;flex-shrink:0;">✉️</span>
                <div>
                  <h4 style="font-size:0.9rem;margin-bottom:4px;" data-en="Email" data-bn="ইমেইল">Email</h4>
                  <a href="mailto:info@yourorg.org" style="font-size:0.875rem;color:var(--color-primary);">info@yourorg.org</a>
                </div>
              </div>
              <div class="card" style="padding:1.25rem;display:flex;gap:1rem;align-items:flex-start;">
                <span style="font-size:1.5rem;flex-shrink:0;">🕐</span>
                <div>
                  <h4 style="font-size:0.9rem;margin-bottom:4px;" data-en="Office Hours" data-bn="অফিস সময়">Office Hours</h4>
                  <p style="font-size:0.875rem;margin:0;" data-en="Saturday – Thursday: 9:00 AM – 5:00 PM" data-bn="শনিবার – বৃহস্পতিবার: সকাল ৯টা – বিকাল ৫টা">Saturday – Thursday: 9:00 AM – 5:00 PM</p>
                </div>
              </div>
            </div>
          </div>

          <!-- Contact Form -->
          <div class="reveal reveal-delay-2">
            <div class="card" style="padding:2rem;">
              <h3 style="margin-bottom:1.5rem;" data-en="Send a Message" data-bn="বার্তা পাঠান">Send a Message</h3>
              <form id="contact-form" novalidate>
                <div class="form-group">
                  <label class="form-label" for="c-name" data-en="Full Name *" data-bn="পূর্ণ নাম *">Full Name *</label>
                  <input type="text" id="c-name" class="form-control"
                         data-validate="required,minLen:3"
                         data-en-placeholder="Enter your full name"
                         data-bn-placeholder="আপনার পূর্ণ নাম লিখুন"
                         placeholder="Enter your full name">
                  <span class="form-error" id="c-name-error"></span>
                </div>
                <div class="form-group">
                  <label class="form-label" for="c-email" data-en="Email Address *" data-bn="ইমেইল ঠিকানা *">Email Address *</label>
                  <input type="email" id="c-email" class="form-control"
                         data-validate="required,email"
                         data-en-placeholder="your@email.com"
                         data-bn-placeholder="আপনার ইমেইল"
                         placeholder="your@email.com">
                  <span class="form-error" id="c-email-error"></span>
                </div>
                <div class="form-group">
                  <label class="form-label" for="c-subject" data-en="Subject *" data-bn="বিষয় *">Subject *</label>
                  <input type="text" id="c-subject" class="form-control"
                         data-validate="required"
                         data-en-placeholder="Message subject"
                         data-bn-placeholder="বার্তার বিষয়"
                         placeholder="Message subject">
                  <span class="form-error" id="c-subject-error"></span>
                </div>
                <div class="form-group">
                  <label class="form-label" for="c-message" data-en="Message *" data-bn="বার্তা *">Message *</label>
                  <textarea id="c-message" class="form-control"
                            data-validate="required,minLen:20"
                            data-en-placeholder="Write your message here..."
                            data-bn-placeholder="এখানে আপনার বার্তা লিখুন..."
                            placeholder="Write your message here..."></textarea>
                  <span class="form-error" id="c-message-error"></span>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;" data-en="Send Message" data-bn="বার্তা পাঠান">Send Message</button>
              </form>
            </div>
          </div>

        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>
  <button id="back-to-top" aria-label="Back to top">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M7.646 4.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1-.708.708L8 5.707l-5.646 5.647a.5.5 0 0 1-.708-.708l6-6z"/></svg>
  </button>
  <div id="toast-container" class="toast-container"></div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/form.js"></script>
</body>
</html>
